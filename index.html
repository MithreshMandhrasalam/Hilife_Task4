<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HILIFE.AI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page">
        <div class="left-panel">
            <div class="left-content">
                <div class="logo">
                    <span class="logo-text">HILIFE<span class="logo-ai">.AI</span></span>
                </div>
            </div>
        </div>
        <div class="right-panel">
            <div class="mobile-header">
                <span class="logo-text">HILIFE<span class="logo-ai">.AI</span></span>
            </div>
            <div class="form-box">
                <div class="tabs">
                    <button id="tab-signin" class="tab active" onclick="switchTab('signin')">Sign In</button>
                    <button id="tab-signup" class="tab" onclick="switchTab('signup')">Sign Up</button>
                </div>
                <div id="panel-signin" class="panel active">
                    <form id="signin-form" onsubmit="handleSignIn(event)">
                        <div class="field">
                            <label>Username</label>
                            <input type="text" id="signin-username" placeholder="Enter your username">
                        </div>
                        <div class="field">
                            <label>Password</label>
                            <div class="pw-wrap">
                                <input type="password" id="signin-password" placeholder="Enter your password">
                                <button type="button" class="eye-btn"
                                    onclick="togglePassword('signin-password', this)">Show</button>
                            </div>
                        </div>
                        <div class="row-between">
                            <label class="check-label">
                                <input type="checkbox" id="signin-remember"> Remember me
                            </label>
                            <button type="button" class="text-link" onclick="forgotPassword()">Forgot password?</button>
                        </div>
                        <button type="submit" id="signin-btn" class="btn-primary">Sign In</button>
                        <p class="switch-text">No account? <button type="button" class="text-link bold"
                                onclick="switchTab('signup')">Sign Up</button></p>
                    </form>
                </div>
                <div id="panel-signup" class="panel">
                    <form id="signup-form" onsubmit="handleSignUp(event)">
                        <div class="field-row">
                            <div class="field">
                                <label>First Name</label>
                                <input type="text" id="signup-firstname" placeholder="First name">
                            </div>
                            <div class="field">
                                <label>Last Name</label>
                                <input type="text" id="signup-lastname" placeholder="Last name">
                            </div>
                        </div>
                        <div class="field">
                            <label>Username</label>
                            <input type="text" id="signup-username" placeholder="Choose a username">
                        </div>
                        <div class="field">
                            <label>Email</label>
                            <input type="email" id="signup-email" placeholder="you@email.com">
                        </div>
                        <div class="field">
                            <label>Password</label>
                            <div class="pw-wrap">
                                <input type="password" id="signup-password" placeholder="Create a password">
                                <button type="button" class="eye-btn"
                                    onclick="togglePassword('signup-password', this)">Show</button>
                            </div>
                        </div>
                        <div class="field">
                            <label>Confirm Password</label>
                            <div class="pw-wrap">
                                <input type="password" id="signup-confirm" placeholder="Re-enter your password">
                                <button type="button" class="eye-btn"
                                    onclick="togglePassword('signup-confirm', this)">Show</button>
                            </div>
                        </div>
                        <button type="submit" id="signup-btn" class="btn-primary">Create Account</button>
                        <p class="switch-text">Have an account? <button type="button" class="text-link bold"
                                onclick="switchTab('signin')">Sign In</button></p>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div id="greeting-overlay" class="overlay" hidden>
        <div class="modal">
            <p class="modal-greeting" id="greeting-label">Good Morning,</p>
            <h2 class="modal-name" id="greeting-name">User!</h2>
            <p class="modal-sub">You are signed in to <strong>HILIFE.AI</strong></p>
            <p class="modal-time" id="greeting-time"></p>
            <p class="clock-status" id="clock-status"></p>
            <button id="clock-toggle-btn" class="btn-primary" onclick="handleClockToggle()"></button>
            <button class="btn-secondary" style="margin-top: 16px;" onclick="closeGreeting()">Go to Dashboard</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
